# JVM settings for the Gradle daemon. 2 GB is plenty for this project and keeps
# the Compose/Kotlin compiler comfortable.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Compose Desktop / Kotlin work fine with configuration cache off; jpackage
# tasks in the Compose plugin are not yet fully configuration-cache safe.
org.gradle.configuration-cache=false
org.gradle.caching=true

kotlin.code.style=official
